<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LAAM First Mile Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef1f5;color:#111827;font-family:Arial,Helvetica,sans-serif}.app{max-width:1180px;margin:0 auto;padding:22px}.header{background:#101827;color:#fff;border-radius:24px;padding:28px;margin-bottom:18px}.header h1{margin:0;font-size:34px}.header p{color:#cbd5e1;margin-bottom:0}.card{background:#fff;border-radius:22px;padding:18px;margin-bottom:16px;box-shadow:0 8px 20px rgba(15,23,42,.07)}.cityGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.cityCard{border:1px solid #e5e7eb;border-radius:22px;padding:22px;background:#fff;cursor:pointer}.cityCard:hover{border-color:#111827}.cityCard h2{margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{border:1px solid #e5e7eb;border-radius:18px;padding:15px;background:#fff}.stat small{color:#6b7280}.stat strong{display:block;font-size:28px;margin-top:5px}input,select,textarea{width:100%;border:1px solid #cfd5df;border-radius:14px;padding:13px;font-size:15px;background:#fff}label{font-weight:800;display:block;margin-bottom:7px}button{border:0;border-radius:14px;padding:13px 16px;font-weight:800;font-size:15px;background:#111827;color:white;cursor:pointer}button.green{background:#15753b}button.red{background:#dc2626}button.secondary{background:#e5e7eb;color:#111827}.hidden{display:none!important}.box{border:1px solid #e5e7eb;border-radius:18px;padding:15px;margin:12px 0;background:#fafafa}.report.pending{border-color:#f59e0b;background:#fffbeb}.report.verified{border-color:#16a34a;background:#ecfdf5}.report.rejected{border-color:#ef4444;background:#fef2f2}.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-weight:800;font-size:12px}.pill.pending{background:#fef3c7;color:#92400e}.pill.verified{background:#dcfce7;color:#166534}.pill.rejected{background:#fee2e2;color:#991b1b}.table{width:100%;border-collapse:collapse;margin-top:10px}.table th,.table td{border:1px solid #e5e7eb;padding:8px;text-align:left;vertical-align:top}.table th{background:#111827;color:white}.hint{color:#6b7280;font-size:14px}@media(max-width:800px){.cityGrid,.grid,.grid2{grid-template-columns:1fr}.app{padding:14px}}
</style>
</head>
<body><div class="app">
<div class="header"><h1>LAAM First Mile Dashboard</h1><p>City-wise inbound verification dashboard linked with the rider gatepass app.</p></div>
<section id="overviewView"><div class="card"><h2>Overview</h2><div class="hint">Select a city to view date-wise gatepass reports.</div></div><div id="cityCards" class="cityGrid"></div></section>
<section id="cityView" class="hidden">
<div class="card"><button class="secondary" onclick="showOverview()">← Back to Cities</button><h2 id="cityTitle">City Reports</h2><div class="grid"><div class="stat"><small>Total Reports</small><strong id="cityTotalReports">0</strong></div><div class="stat"><small>Total Qty</small><strong id="cityTotalQty">0</strong></div><div class="stat"><small>Pending</small><strong id="cityPending">0</strong></div><div class="stat"><small>Rejected</small><strong id="cityRejected">0</strong></div></div></div>
<div class="card"><div class="grid2"><div><label>Select Date</label><select id="dateSelect"></select></div><div><label>Search RFP / Brand / Rider</label><input id="searchBox" placeholder="Search..."></div></div><br><button id="refreshBtn">Refresh</button><div id="status" class="hint"></div></div>
<div class="card"><h2 id="dateHeading">Reports</h2><div id="reportList"></div></div>
</section></div>
<script>
const SUPABASE_URL="https://xjskbvvgsaeqcqsebrzy.supabase.co", SUPABASE_KEY="sb_publishable_OJT55WMHSwI3pu62jpOtlQ_yR8cKssa", DELETE_PASSCODE="1234";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY), $=id=>document.getElementById(id);
const safe=v=>String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
const cities=["Lahore","Karachi","Faisalabad","Gujranwala"]; let reports=[],selectedCity="",selectedDate="";
function statusOf(r){return r.status||(r.verified?"verified":"pending")}
function needsAction(r){return statusOf(r)!=="verified"}
function fromDb(r){return {id:r.id,city:r.city||"",vendor:r.vendor||"",rider:r.rider||"",zone:r.zone||"",gatepassNo:r.gatepass_no||r.rfp_id||"",rfpId:r.rfp_id||r.gatepass_no||"",submittedAt:r.submitted_at||"",dateKey:r.date_key||(r.created_at?String(r.created_at).slice(0,10):"Unknown"),dateLabel:r.date_label||r.date_key||(r.created_at?String(r.created_at).slice(0,10):"Unknown"),items:r.items||[],totalQty:Number(r.total_qty||0),vendorSig:r.vendor_sig||"",riderSig:r.rider_sig||"",verified:!!r.verified,status:r.status||(r.verified?"verified":"pending"),vendorPocName:r.vendor_poc_name||"",vendorPocNumber:r.vendor_poc_number||"",rejectionReason:r.rejection_reason||"",rejectedAt:r.rejected_at||"",verifiedAt:r.verified_at||"",editedVersion:!!r.edited_version,originalGatepassNo:r.original_gatepass_no||""}}
async function load(){ if($("status")) $("status").textContent="Loading..."; const {data,error}=await sb.from("gatepass_reports").select("*").order("created_at",{ascending:false}); if(error){if($("status"))$("status").textContent="Supabase error: "+error.message;return} reports=(data||[]).map(fromDb); if($("status"))$("status").textContent="Last refreshed: "+new Date().toLocaleTimeString(); renderOverview(); if(selectedCity)renderCity();}
function showOverview(){selectedCity="";$("cityView").classList.add("hidden");$("overviewView").classList.remove("hidden");renderOverview()}
function openCity(c){selectedCity=c;selectedDate="";$("overviewView").classList.add("hidden");$("cityView").classList.remove("hidden");renderCity()}
function cityRows(c){return reports.filter(r=>r.city===c)}
function renderOverview(){$("cityCards").innerHTML=cities.map(c=>{const rows=cityRows(c),p=rows.filter(r=>statusOf(r)==="pending").length,v=rows.filter(r=>statusOf(r)==="verified").length,rej=rows.filter(r=>statusOf(r)==="rejected").length,qty=rows.reduce((s,r)=>s+Number(r.totalQty||0),0);return `<div class="cityCard" onclick="openCity('${c}')"><h2>${c}</h2><div>Reports: <b>${rows.length}</b></div><div>Total Qty: <b>${qty}</b></div><div>Pending: ${p} · Verified: ${v} · Rejected: ${rej}</div></div>`}).join("")}
function uniqueDates(rows){const map=new Map();rows.forEach(r=>map.set(r.dateKey||"Unknown",r.dateLabel||r.dateKey||"Unknown"));return Array.from(map.entries()).sort((a,b)=>String(b[0]).localeCompare(String(a[0])))}
function renderCity(){const rows=cityRows(selectedCity);$("cityTitle").textContent=selectedCity+" Reports";$("cityTotalReports").textContent=rows.length;$("cityTotalQty").textContent=rows.reduce((s,r)=>s+Number(r.totalQty||0),0);$("cityPending").textContent=rows.filter(r=>statusOf(r)==="pending").length;$("cityRejected").textContent=rows.filter(r=>statusOf(r)==="rejected").length;const dates=uniqueDates(rows);if(!selectedDate&&dates.length)selectedDate="__ALL__";if(!dates.find(d=>d[0]===selectedDate)&&dates.length)selectedDate=dates[0][0];$("dateSelect").innerHTML=dates.length?`<option value="__ALL__" ${selectedDate==="__ALL__"?"selected":""}>All Dates</option>`+dates.map(([k,l])=>`<option value="${safe(k)}" ${k===selectedDate?"selected":""}>${safe(l)}</option>`).join(""):'<option value="">No dates</option>';renderReports()}
function filteredRows(){const q=$("searchBox").value.trim().toLowerCase();return cityRows(selectedCity).filter(r=>(selectedDate==="__ALL__"||!selectedDate||r.dateKey===selectedDate)&&(!q||[r.rfpId,r.gatepassNo,r.vendor,r.rider,r.city].join(" ").toLowerCase().includes(q)))}
function renderReports(){const list=filteredRows(),label=$("dateSelect").selectedOptions[0]?.textContent||"";$("dateHeading").textContent=(selectedCity||"")+" · "+label+" Reports";$("reportList").innerHTML=list.length?list.map(reportCard).join(""):'<div class="hint">No reports found. Try All Dates or run the Supabase visibility SQL.</div>'}
function reportCard(r){const st=statusOf(r),rows=(r.items||[]).map((it,i)=>`<tr><td>${safe(it.serial||i+1)}</td><td>${safe(it.article||it.detail||"")}</td><td>${safe(it.sku||"-")}</td><td>${safe(it.qty||0)}</td></tr>`).join("");return `<div class="box report ${st}"><h3>${safe(r.city)} · RFP ${safe(r.rfpId)}</h3><span class="pill ${st}">${safe(st)}</span> ${r.editedVersion?'<span class="pill verified">Edited Version</span>':""}<p><b>Brand:</b> ${safe(r.vendor)} · <b>Rider:</b> ${safe(r.rider)} · <b>Zone:</b> ${safe(r.zone)}</p><p><b>Vendor POC:</b> ${safe(r.vendorPocName)} / ${safe(r.vendorPocNumber)} · <b>Total Qty:</b> ${safe(r.totalQty)}</p>${r.rejectionReason?`<p><b>Rejection Reason:</b> ${safe(r.rejectionReason)}</p>`:""}<table class="table"><thead><tr><th>SR</th><th>Article / Description</th><th>SKU</th><th>Qty</th></tr></thead><tbody>${rows}</tbody></table><br><div class="grid2"><button onclick="downloadPdf('${r.id}')">View / Download PDF</button>${needsAction(r)?`<button class="green" onclick="verifyReport('${r.id}')">Verify</button>`:""}</div>${needsAction(r)?`<br><textarea id="reject_${r.id}" placeholder="Rejection reason"></textarea><br><button class="red" onclick="rejectReport('${r.id}')">Reject</button>`:""}<br><button class="red" onclick="deleteReport('${r.id}')">Delete Report</button></div>`}
async function verifyReport(id){const {error}=await sb.from("gatepass_reports").update({status:"verified",verified:true,verified_at:new Date().toLocaleString("en-PK"),verified_by:"Dashboard"}).eq("id",id);if(error)return alert("Verify failed: "+error.message);await load()}
async function rejectReport(id){const reason=$("reject_"+id)?.value.trim();if(!reason)return alert("Enter rejection reason.");const {error}=await sb.from("gatepass_reports").update({status:"rejected",verified:false,rejected_at:new Date().toLocaleString("en-PK"),rejected_by:"Dashboard",rejection_reason:reason}).eq("id",id);if(error)return alert("Reject failed: "+error.message);await load()}
async function deleteReport(id){const pin=prompt("Enter delete passcode");if(pin!==DELETE_PASSCODE)return alert("Wrong passcode.");if(!confirm("Delete this gatepass report permanently?"))return;const {error}=await sb.from("gatepass_reports").delete().eq("id",id);if(error)return alert("Delete failed: "+error.message);await load()}
function downloadPdf(id){const r=reports.find(x=>x.id===id);if(!r)return;const {jsPDF}=window.jspdf,doc=new jsPDF();let y=14;doc.setFillColor(16,24,39);doc.roundedRect(12,8,186,25,4,4,"F");doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont(undefined,"bold");doc.text("LAAM FIRST MILE GATEPASS",105,20,{align:"center"});doc.setFontSize(9);doc.setFont(undefined,"normal");doc.text("Generated: "+new Date().toLocaleString("en-PK"),105,27,{align:"center"});doc.setTextColor(0,0,0);y=42;const info=[["RFP ID",r.rfpId],["City",r.city],["Brand",r.vendor],["Zone",r.zone],["Picker/Rider",r.rider],["Status",statusOf(r)],["Vendor POC",r.vendorPocName],["Phone",r.vendorPocNumber],["Total Qty",r.totalQty]];for(let i=0;i<info.length;i+=2){doc.setFontSize(9);doc.setFont(undefined,"bold");doc.text(info[i][0]+":",14,y);doc.setFont(undefined,"normal");doc.text(String(info[i][1]||""),42,y);if(info[i+1]){doc.setFont(undefined,"bold");doc.text(info[i+1][0]+":",110,y);doc.setFont(undefined,"normal");doc.text(String(info[i+1][1]||""),140,y)}y+=7}y+=5;doc.setFillColor(16,24,39);doc.setTextColor(255,255,255);doc.rect(14,y,182,8,"F");doc.setFontSize(8);doc.text("SR",17,y+5);doc.text("Article / Description",32,y+5);doc.text("SKU",132,y+5);doc.text("Qty",178,y+5);y+=8;doc.setTextColor(0,0,0);(r.items||[]).forEach((it,i)=>{if(y>245){doc.addPage();y=14}doc.rect(14,y,182,8);doc.text(String(it.serial||i+1),17,y+5);doc.text(String(it.article||it.detail||"").slice(0,48),32,y+5);doc.text(String(it.sku||"-").slice(0,22),132,y+5);doc.text(String(it.qty||0),178,y+5);y+=8});y+=12;if(y>230){doc.addPage();y=20}doc.setFont(undefined,"bold");doc.text("Vendor Signature",20,y);doc.text("Rider Signature",118,y);y+=5;doc.setDrawColor(207,213,223);doc.roundedRect(14,y,80,38,3,3);doc.roundedRect(110,y,80,38,3,3);if(r.vendorSig)doc.addImage(r.vendorSig,"PNG",18,y+4,70,22);if(r.riderSig)doc.addImage(r.riderSig,"PNG",114,y+4,70,22);doc.setFontSize(8);doc.setFont(undefined,"normal");doc.text("Name: "+(r.vendorPocName||""),18,y+33);doc.text("Name: "+(r.rider||""),114,y+33);doc.save("Gatepass-"+r.rfpId+".pdf")}
$("dateSelect").onchange=e=>{selectedDate=e.target.value;renderReports()};$("searchBox").oninput=renderReports;$("refreshBtn").onclick=load;load();
</script></body></html>
